<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hammerspoon Action</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #2d2d2d;
        color: #f2f2f2;
      }

      body {
        margin: 0;
        padding: 16px;
      }

      main {
        display: grid;
        gap: 8px;
      }

      label {
        font-size: 12px;
        font-weight: 600;
      }

      .description {
        margin: 0;
        color: #bdbdbd;
        font-size: 11px;
        line-height: 1.4;
      }


      select {
        box-sizing: border-box;
        width: 100%;
        min-height: 32px;
        padding: 6px 8px;
        border: 1px solid #555;
        border-radius: 4px;
        background: #1f1f1f;
        color: inherit;
        font: inherit;
      }

      #action-settings {
        display: grid;
        gap: 8px;
      }

      #settings-status {
        margin: 0;
        color: #bdbdbd;
        font-size: 11px;
      }

      input,
      #action-settings select {
        box-sizing: border-box;
        width: 100%;
        min-height: 32px;
        padding: 6px 8px;
        border: 1px solid #555;
        border-radius: 4px;
        background: #1f1f1f;
        color: inherit;
        font: inherit;
      }

      #action-settings .field-row {
        position: relative;
        display: grid;
        gap: 4px;
        padding: 8px;
        border: 1px solid #444;
        border-radius: 6px;
        background: #272727;
      }

      #action-settings .field-label {
        order: 1;
        padding-right: 92px;
      }

      #action-settings input,
      #action-settings select {
        order: 2;
      }

      #action-settings .field-description {
        order: 3;
        color: #bdbdbd;
        font-size: 11px;
        font-weight: 400;
        line-height: 1.4;
      }

      button.field-action {
        position: absolute;
        top: 5px;
        min-height: 24px;
        padding: 2px 6px;
        border: 1px solid #555;
        border-radius: 4px;
        background: #333;
        color: inherit;
        font-size: 10px;
        cursor: pointer;
      }

      button.reset-field {
        right: 6px;
      }

      button.refresh-field {
        right: 48px;
      }

      .settings-section {
        border: 1px solid #444;
        border-radius: 6px;
        padding: 6px;
      }

      .settings-section summary {
        cursor: pointer;
        color: #dedede;
        font-size: 12px;
        font-weight: 600;
      }

      .settings-section[open] summary {
        margin-bottom: 6px;
      }

      .settings-section .field-row + .field-row {
        margin-top: 6px;
      }


      .catalog-search {
        width: 100%;
      }

      .preview-panel {
        display: grid;
        place-items: center;
        min-height: 126px;
        padding: 10px;
        border: 1px solid #484848;
        border-radius: 8px;
        background: #222;
      }

      .preview-device {
        position: relative;
        display: grid;
        place-items: center;
        overflow: hidden;
        width: 104px;
        height: 104px;
        border: 2px solid #5f5f5f;
        border-radius: 16px;
        box-shadow: 0 5px 14px #0008;
        text-align: center;
      }

      .preview-device.encoder {
        width: min(240px, 100%);
        height: 76px;
        border-radius: 10px;
      }

      #preview-icon {
        position: absolute;
        inset: 8px;
        width: calc(100% - 16px);
        height: calc(100% - 16px);
        object-fit: contain;
        opacity: 0.72;
      }

      #preview-title,
      #preview-value {
        position: relative;
        z-index: 1;
        max-width: 92%;
        overflow: hidden;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.1;
        text-shadow: 0 1px 3px #000;
        white-space: pre-line;
      }

      #preview-value {
        position: absolute;
        bottom: 10px;
        font-size: 10px;
      }

      #preview-badge {
        position: absolute;
        z-index: 2;
        top: 6px;
        right: 6px;
        min-width: 18px;
        padding: 2px 4px;
        border-radius: 9px;
        background: #f5f5f5;
        color: #111;
        font-size: 9px;
        font-weight: 800;
      }

      .preview-progress-track {
        position: absolute;
        z-index: 2;
        right: 7px;
        bottom: 5px;
        left: 7px;
        height: 3px;
        overflow: hidden;
        border-radius: 2px;
        background: #ffffff33;
      }

      #preview-progress {
        display: block;
        height: 100%;
        background: currentColor;
      }

      .settings-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 4px;
        font-size: 12px;
        font-weight: 700;
      }

      #reset-action {
        min-height: 26px;
        padding: 3px 7px;
        border: 1px solid #555;
        border-radius: 4px;
        background: #333;
        color: inherit;
        font-size: 10px;
      }

      #settings-status[data-feedback="success"] {
        color: #65d88a;
      }

      #settings-status[data-feedback="error"] {
        color: #ff7c7c;
      }

      input[type="checkbox"] {
        width: auto;
        min-height: auto;
        margin-left: 8px;
        vertical-align: middle;
      }

      #connection-status {
        margin: 2px 0 0;
        color: #bdbdbd;
        font-size: 11px;
      }
      #connection-details {
        margin: 0;
        color: #bdbdbd;
        font-size: 11px;
        line-height: 1.4;
      }
      #setup-guide {
        width: 100%;
        min-height: 30px;
        padding: 6px 8px;
        border: 1px solid #666;
        border-radius: 4px;
        background: #3a3a3a;
        color: inherit;
        font: inherit;
        cursor: pointer;
      }

      #setup-guide:disabled {
        cursor: default;
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <main>
      <label for="action-id">Hammerspoon action</label>
      <label for="action-search">Find an action</label>
      <input id="action-search" class="catalog-search" type="search" placeholder="Search actions" disabled />
      <select
        id="action-id"
        name="actionId"
        aria-describedby="action-description connection-status connection-details"
        disabled
      >
        <option value="">No actions available</option>
      </select>
      <p id="action-description" class="description" role="note" aria-live="polite"></p>
      <p id="action-gestures" class="description" role="note"></p>
      <section class="preview-panel" aria-label="Live action preview">
        <div id="preview-device" class="preview-device keypad">
          <img id="preview-icon" alt="" hidden />
          <span id="preview-title">Select action</span>
          <span id="preview-value" hidden></span>
          <span id="preview-badge" hidden></span>
          <span class="preview-progress-track"><span id="preview-progress"></span></span>
        </div>
      </section>
      <div class="settings-heading">
        <span>Settings</span>
        <button id="reset-action" type="button" disabled>Reset all</button>
      </div>
      <section id="action-settings" aria-live="polite"></section>
      <p id="settings-status" role="status" aria-live="polite">Select an action to edit its settings.</p>
      <p id="connection-status" role="status" aria-live="polite">Connecting</p>
      <p id="connection-details" role="note" aria-live="polite"></p>
      <button id="setup-guide" type="button" disabled>Open setup guide</button>
    </main>
    <script src="property-inspector.js"></script>
  </body>
</html>
