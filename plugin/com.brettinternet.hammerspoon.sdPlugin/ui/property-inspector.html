<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hammerspoon Action</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #2d2d2d;
        color: #f2f2f2;
      }

      body {
        margin: 0;
        padding: 16px;
      }

      main {
        display: grid;
        gap: 8px;
      }

      label {
        font-size: 12px;
        font-weight: 600;
      }

      select {
        box-sizing: border-box;
        width: 100%;
        min-height: 32px;
        padding: 6px 8px;
        border: 1px solid #555;
        border-radius: 4px;
        background: #1f1f1f;
        color: inherit;
        font: inherit;
      }

      #connection-status {
        margin: 2px 0 0;
        color: #bdbdbd;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <main>
      <label for="action-id">Hammerspoon action ID</label>
      <select id="action-id" name="actionId" aria-describedby="connection-status">
        <option value="">No action selected</option>
      </select>
      <p id="connection-status" role="status" aria-live="polite">Connecting to Stream Deck…</p>
    </main>
    <script src="property-inspector.js"></script>
  </body>
</html>
