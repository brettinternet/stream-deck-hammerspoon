<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hammerspoon Action</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #2d2d2d;
        color: #f2f2f2;
      }

      body {
        margin: 0;
        padding: 16px;
      }

      main {
        display: grid;
        gap: 8px;
      }

      label {
        font-size: 12px;
        font-weight: 600;
      }

      .description {
        margin: 0;
        color: #bdbdbd;
        font-size: 11px;
        line-height: 1.4;
      }


      select {
        box-sizing: border-box;
        width: 100%;
        min-height: 32px;
        padding: 6px 8px;
        border: 1px solid #555;
        border-radius: 4px;
        background: #1f1f1f;
        color: inherit;
        font: inherit;
      }

      #action-settings {
        display: grid;
        gap: 8px;
      }

      #settings-status {
        margin: 0;
        color: #bdbdbd;
        font-size: 11px;
      }

      input,
      #action-settings select {
        box-sizing: border-box;
        width: 100%;
        min-height: 32px;
        padding: 6px 8px;
        border: 1px solid #555;
        border-radius: 4px;
        background: #1f1f1f;
        color: inherit;
        font: inherit;
      }

      #action-settings label {
        display: grid;
        gap: 4px;
      }

      #action-settings .field-label {
        order: 1;
      }

      #action-settings input,
      #action-settings select {
        order: 2;
      }

      #action-settings .field-description {
        order: 3;
        color: #bdbdbd;
        font-size: 11px;
        font-weight: 400;
        line-height: 1.4;
      }


      input[type="checkbox"] {
        width: auto;
        min-height: auto;
        margin-left: 8px;
        vertical-align: middle;
      }

      #connection-status {
        margin: 2px 0 0;
        color: #bdbdbd;
        font-size: 11px;
      }
      #connection-details {
        margin: 0;
        color: #bdbdbd;
        font-size: 11px;
        line-height: 1.4;
      }
      #setup-guide {
        width: 100%;
        min-height: 30px;
        padding: 6px 8px;
        border: 1px solid #666;
        border-radius: 4px;
        background: #3a3a3a;
        color: inherit;
        font: inherit;
        cursor: pointer;
      }

      #setup-guide:disabled {
        cursor: default;
        opacity: 0.55;
      }
    </style>
  </head>
  <body>
    <main>
      <label for="action-id">Hammerspoon action</label>
      <select
        id="action-id"
        name="actionId"
        aria-describedby="action-description connection-status connection-details"
        disabled
      >
        <option value="">No actions available</option>
      </select>
      <p id="action-description" class="description" role="note" aria-live="polite"></p>
      <section id="action-settings" aria-live="polite"></section>
      <p id="settings-status" role="status" aria-live="polite">Select an action to edit its settings.</p>
      <p id="connection-status" role="status" aria-live="polite">Connecting</p>
      <p id="connection-details" role="note" aria-live="polite"></p>
      <button id="setup-guide" type="button" disabled>Open setup guide</button>
    </main>
    <script src="property-inspector.js"></script>
  </body>
</html>
