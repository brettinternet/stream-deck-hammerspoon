name: CI

on:
  push:
    paths:
      - "protocol/schema/**"
      - "plugin/**"
      - "hammerspoon/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - "eslint.config.js"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "protocol/schema/**"
      - "plugin/**"
      - "hammerspoon/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - "eslint.config.js"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run lint
        run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Set up Lua
        uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: "5.4"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run tests
        run: bun run test
